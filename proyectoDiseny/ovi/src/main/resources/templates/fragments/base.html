<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SgOVI - Sistema de gestió de l'Oficina per la Vida Independent">
    <meta name="author" content="OVI Castelló">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">SgOVI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container main-content" layout:fragment="content">
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- Notificacions globals -->
<script th:if="${successMessage}" th:inline="javascript">
    /*<![CDATA[*/
    alert(/*[[${successMessage}]]*/ '');
    /*]]>*/
</script>
<script th:if="${errorMessage}" th:inline="javascript">
    /*<![CDATA[*/
    alert(/*[[${errorMessage}]]*/ '');
    /*]]>*/
</script>

</body>
</html>
