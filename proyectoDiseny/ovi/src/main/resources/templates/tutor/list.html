<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Gestionar Tutors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container">
    <h1>Llista de Tutors</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Telèfon</th>
            <th>Data Naixement</th>
            <th>Adreça</th>
            <th>Email</th>
            <th>Relació</th>
            <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tutor : ${tutors}">
            <td th:text="${tutor.tutorID}"></td>
            <td th:text="${tutor.nameAndSurname}"></td>
            <td th:text="${tutor.phoneNumber}"></td>
            <td th:text="${tutor.birthDate}"></td>
            <td th:text="${tutor.homeAddress}"></td>
            <td th:text="${tutor.emailAddress}"></td>
            <td th:text="${tutor.relationshipWithUser}"></td>
            <td>
                <a th:href="@{/tutor/edit/{id}(id=${tutor.tutorID})}" class="btn btn-warning">Edita</a>
                <a th:href="@{/tutor/delete/{id}(id=${tutor.tutorID})}" class="btn btn-danger">Esborra</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="add" class="btn btn-success">Afegeix Tutor</a>
    <br><br>
    <a href="/" class="btn btn-info">Tornar</a>
</main>
</body>
</html>
