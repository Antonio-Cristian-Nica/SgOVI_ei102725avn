<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>SgOVI - Registre PAP/PATI</title>

    <style>
        .form-section {
            margin-top: 40px;
            background-color: #FFFFFF;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 25px;
        }

        /* Ajuste para que los grupos dentro de form-row no sumen margen doble */
        .form-row .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            color: var(--color-primario);
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 4px;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--color-primario);
        }

        /* Estilos de Error (Naranja Contraste) */
        .input-error {
            border-color: var(--color-contraste) !important;
            background-color: rgba(255, 140, 0, 0.05);
        }

        .error-text {
            color: var(--color-contraste);
            font-size: 15px;
            font-weight: bold;
            margin-top: 8px;
            display: block;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 15px;
            background-color: var(--bg-crema);
            border-radius: 4px;
            border: 1px solid #E0E0E0;
        }

        .checkbox-container input {
            width: 22px;
            height: 22px;
            accent-color: var(--color-primario);
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="logo-section">
            <div class="org-name">
                <span class="name-top">SgOVI</span>
                <span class="name-bottom">Gestió de Comptes</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <main class="form-section">
        <h1 style="color: var(--color-primario); margin-bottom: 10px;">Registre de nou PAP/PATI</h1>
        <p style="margin-bottom: 30px; color: #666;">Emplene tots els camps a continuació. Els camps marcats amb error s'han de corregir per a poder avançar.</p>

        <form th:action="@{/pappati/add}" th:object="${pappati}" method="post">

            <div class="form-group">
                <label for="nameAndSurname">Nom i Cognoms</label>
                <input type="text" id="nameAndSurname" th:field="*{nameAndSurname}"
                       th:class="${#fields.hasErrors('nameAndSurname')} ? 'input-error' : ''"
                       placeholder="Ex: Joan García i Pons" />
                <span class="error-text" th:if="${#fields.hasErrors('nameAndSurname')}" th:errors="*{nameAndSurname}"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="emailAddress">Correu Electrònic</label>
                    <input type="email" id="emailAddress" th:field="*{emailAddress}"
                           th:class="${#fields.hasErrors('emailAddress')} ? 'input-error' : ''"
                           placeholder="usuari@exemple.com" />
                    <span class="error-text" th:if="${#fields.hasErrors('emailAddress')}" th:errors="*{emailAddress}"></span>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Telèfon de contacte</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}"
                           th:class="${#fields.hasErrors('phoneNumber')} ? 'input-error' : ''"
                           placeholder="Ex: 600123456" />
                    <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="birthDate">Data de Naixement</label>
                    <input type="date" id="birthDate" th:field="*{birthDate}"
                           th:class="${#fields.hasErrors('birthDate')} ? 'input-error' : ''" />
                    <span class="error-text" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></span>
                </div>

                <div class="form-group">
                    <label for="status">Estat del Candidat</label>
                    <select id="status" th:field="*{status}" th:class="${#fields.hasErrors('status')} ? 'input-error' : ''">
                        <option value="">Seleccione un estat...</option>
                        <option value="Pendent">Pendent de validació</option>
                        <option value="Actiu">Actiu</option>
                    </select>
                    <span class="error-text" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="homeAddress">Adreça Habitual</label>
                <input type="text" id="homeAddress" th:field="*{homeAddress}"
                       th:class="${#fields.hasErrors('homeAddress')} ? 'input-error' : ''"
                       placeholder="Carrer, Número, Pis, Ciutat, Codi Postal" />
                <span class="error-text" th:if="${#fields.hasErrors('homeAddress')}" th:errors="*{homeAddress}"></span>
            </div>

            <div class="form-group">
                <label for="academicBackground">Formació Acadèmica</label>
                <textarea id="academicBackground" th:field="*{academicBackground}" rows="3"
                          th:class="${#fields.hasErrors('academicBackground')} ? 'input-error' : ''"
                          placeholder="Indique els seus estudis i titulacions..."></textarea>
                <span class="error-text" th:if="${#fields.hasErrors('academicBackground')}" th:errors="*{academicBackground}"></span>
            </div>

            <div class="form-group">
                <label for="professionalExperience">Experiència Professional</label>
                <textarea id="professionalExperience" th:field="*{professionalExperience}" rows="3"
                          th:class="${#fields.hasErrors('professionalExperience')} ? 'input-error' : ''"
                          placeholder="Explique breument la seua experiència laboral rellevant..."></textarea>
                <span class="error-text" th:if="${#fields.hasErrors('professionalExperience')}" th:errors="*{professionalExperience}"></span>
            </div>

            <div class="form-group">
                <label for="specializationAreas">Àrees d'Especialització</label>
                <input type="text" id="specializationAreas" th:field="*{specializationAreas}"
                       th:class="${#fields.hasErrors('specializationAreas')} ? 'input-error' : ''"
                       placeholder="Ex: Fisioteràpia, Psicologia infantil, etc." />
                <span class="error-text" th:if="${#fields.hasErrors('specializationAreas')}" th:errors="*{specializationAreas}"></span>
            </div>

            <div class="form-group">
                <label for="documents">Documents Adjunts (URL o Referència)</label>
                <input type="text" id="documents" th:field="*{documents}"
                       th:class="${#fields.hasErrors('documents')} ? 'input-error' : ''"
                       placeholder="Enllaç a la carpeta amb els certificats o currículum" />
                <span class="error-text" th:if="${#fields.hasErrors('documents')}" th:errors="*{documents}"></span>
            </div>

            <div class="form-group">
                <label class="checkbox-container" th:classappend="${#fields.hasErrors('LOPDAcceptance')} ? 'input-error' : ''">
                    <input type="checkbox" id="LOPDAcceptance" th:field="*{LOPDAcceptance}" />
                    <span>He llegit i accepte la <strong>Política de Protecció de Dades (LOPD)</strong></span>
                </label>
                <span class="error-text" th:if="${#fields.hasErrors('LOPDAcceptance')}" th:errors="*{LOPDAcceptance}"></span>
            </div>

            <div style="text-align: right; margin-top: 40px; padding-top: 20px; border-top: 1px solid #E0E0E0;">
                <a th:href="@{/}" style="margin-right: 25px; color: var(--color-secundario); text-decoration: none; font-weight: bold;">Cancel·lar</a>
                <button type="submit" class="btn">Registrar PAP/PATI</button>
            </div>

        </form>
    </main>
</div>

<footer style="margin-top: 50px; text-align: center; padding: 20px; color: var(--color-primario);">
    <p>&copy; 2026 SgOVI - Tots els drets reservats</p>
</footer>

</body>
</html>
