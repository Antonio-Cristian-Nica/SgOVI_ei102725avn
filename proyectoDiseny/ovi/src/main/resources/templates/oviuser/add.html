<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Afegir Usuari OVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container">
    <h1>Afegir Usuari OVI</h1>
    <form th:action="@{/oviuser/add}" th:object="${oviUser}" method="post">
        <div class="mb-3">
            <label for="nameAndSurname" class="form-label">Nom i Cognoms</label>
            <input type="text" class="form-control" id="nameAndSurname" th:field="*{nameAndSurname}"/>
        </div>
        <div class="mb-3">
            <label for="phoneNumber" class="form-label">Telèfon</label>
            <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}"/>
        </div>
        <div class="mb-3">
            <label for="birthDate" class="form-label">Data Naixement</label>
            <input type="date" class="form-control" id="birthDate" th:field="*{birthDate}"/>
        </div>
        <div class="mb-3">
            <label for="homeAddress" class="form-label">Adreça</label>
            <input type="text" class="form-control" id="homeAddress" th:field="*{homeAddress}"/>
        </div>
        <div class="mb-3">
            <label for="emailAddress" class="form-label">Email</label>
            <input type="email" class="form-control" id="emailAddress" th:field="*{emailAddress}"/>
        </div>
        <div class="mb-3">
            <label for="functionalDiversity" class="form-label">Diversitat Funcional</label>
            <input type="text" class="form-control" id="functionalDiversity" th:field="*{functionalDiversity}"/>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="LOPDAcceptance" th:field="*{LOPDAcceptance}"/>
            <label for="LOPDAcceptance" class="form-check-label">Acceptació LOPD</label>
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Estat</label>
            <select class="form-control" id="status" th:field="*{status}">
                <option value="active">Actiu</option>
                <option value="inactive">Inactiu</option>
                <option value="approvalPending">Pendent d'aprovació</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="tutorID" class="form-label">Tutor</label>
            <select class="form-control" id="tutorID" th:field="*{tutorID}">
                <option value="">Sense tutor</option>
                <option th:each="tutor : ${tutors}"
                        th:value="${tutor.tutorID}"
                        th:text="${tutor.nameAndSurname}"/>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/oviuser/list" class="btn btn-info">Cancel·lar</a>
    </form>
</main>
</body>
</html>
