<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Canviar contrasenya</title>
</head>
<body>

<div layout:fragment="content">
    <div class="login-wrapper">
        <div class="form-section">

            <h2 class="section-title">Canviar contrasenya</h2>
            <p class="section-subtitle">Introdueix la teua contrasenya actual i la nova que vols utilitzar.</p>

            <div th:if="${errorActual}" class="alert alert-error">
                <span th:text="${errorActual}"></span>
            </div>

            <form th:action="@{/oviUser/canviarContrasenya}" th:object="${changePasswordForm}" method="post">

                <div class="form-group">
                    <label for="currentPassword">Contrasenya actual</label>
                    <input type="password" id="currentPassword" th:field="*{currentPassword}"
                           th:class="${#fields.hasErrors('currentPassword')} ? 'input-error' : ''"
                           placeholder="La teua contrasenya actual" />
                    <span class="error-text" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
                </div>

                <div class="form-group">
                    <label for="newPassword">Nova contrasenya</label>
                    <input type="password" id="newPassword" th:field="*{newPassword}"
                           th:class="${#fields.hasErrors('newPassword')} ? 'input-error' : ''"
                           placeholder="Mínim 6 caràcters" />
                    <span class="error-text" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirma la nova contrasenya</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                           th:class="${#fields.hasErrors('confirmPassword')} ? 'input-error' : ''"
                           placeholder="Repeteix la nova contrasenya" />
                    <span class="error-text" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/oviUser/portal}" class="btn btn-secondary">Cancel·lar</a>
                    <button type="submit" class="btn btn-primary">Guardar contrasenya</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
