<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Nova sol·licitud</title>
</head>
<body>

<div layout:fragment="content">
    <div class="form-section">

        <h1 class="section-title">Nova sol·licitud d'assistència</h1>
        <p class="section-subtitle">
            Indica on necessites el servei i quin tipus d'assistència requeixes.
            Els camps marcats amb
            <span aria-hidden="true">*</span><span class="sr-only">asterisc</span>
            són obligatoris.
        </p>

        <form th:action="@{/oviUser/solicitudes/add}" th:object="${solicitud}" method="post" novalidate>

            <div class="form-group">
                <label for="serviceLocation">Localització del servei <span aria-hidden="true">*</span></label>
                <input type="text" id="serviceLocation" th:field="*{serviceLocation}"
                       th:class="${#fields.hasErrors('serviceLocation')} ? 'input-error' : ''"
                       placeholder="Ex: Castelló de la Plana, Carrer Major 5"
                       autocomplete="street-address" required />
                <span class="error-text" th:if="${#fields.hasErrors('serviceLocation')}"
                      th:errors="*{serviceLocation}"></span>
            </div>

            <div class="form-group">
                <label for="requiredAssistance">Assistència requerida <span aria-hidden="true">*</span></label>
                <textarea id="requiredAssistance" th:field="*{requiredAssistance}" rows="4"
                          th:class="${#fields.hasErrors('requiredAssistance')} ? 'input-error' : ''"
                          placeholder="Descriu detalladament el tipus d'assistència que necessites..."
                          required></textarea>
                <span class="error-text" th:if="${#fields.hasErrors('requiredAssistance')}"
                      th:errors="*{requiredAssistance}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/oviUser/solicitudes}" class="btn btn-secondary">Cancel·lar</a>
                <button type="submit" class="btn btn-primary">Continuar amb els horaris</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
