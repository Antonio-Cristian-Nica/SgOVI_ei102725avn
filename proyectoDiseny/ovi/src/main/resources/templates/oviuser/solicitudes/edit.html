<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Editar sol·licitud</title>
</head>
<body>

<div layout:fragment="content">
    <div class="form-section">

        <h1 class="section-title">Editar sol·licitud</h1>
        <p class="section-subtitle">
            Modifica les dades de la teua sol·licitud d'assistència. Els camps marcats amb
            <span aria-hidden="true">*</span><span class="sr-only">asterisc</span>
            són obligatoris.
        </p>

        <form th:action="@{/oviUser/solicitudes/edit/{id}(id=${solicitud.requestID})}"
              th:object="${solicitud}" method="post" novalidate>

            <input type="hidden" th:field="*{status}" />
            <input type="hidden" th:field="*{oviID}" />

            <div class="form-group">
                <label for="serviceLocation">Localització del servei <span aria-hidden="true">*</span></label>
                <input type="text" id="serviceLocation" th:field="*{serviceLocation}"
                       th:class="${#fields.hasErrors('serviceLocation')} ? 'input-error' : ''"
                       placeholder="Ex: Castelló de la Plana, Carrer Major 5"
                       autocomplete="street-address" required />
                <span class="error-text" th:if="${#fields.hasErrors('serviceLocation')}"
                      th:errors="*{serviceLocation}"></span>
            </div>

            <div class="form-group">
                <label for="requiredAssistance">Assistència requerida <span aria-hidden="true">*</span></label>
                <textarea id="requiredAssistance" th:field="*{requiredAssistance}" rows="4"
                          th:class="${#fields.hasErrors('requiredAssistance')} ? 'input-error' : ''"
                          placeholder="Descriu detalladament el tipus d'assistència que necessites..."
                          required></textarea>
                <span class="error-text" th:if="${#fields.hasErrors('requiredAssistance')}"
                      th:errors="*{requiredAssistance}"></span>
            </div>

            <input type="hidden" th:field="*{type}" />

            <th:block th:if="*{type == 'flexible'}">
                <div class="form-group">
                    <label for="startServiceDate">Data d'inici del servei <span aria-hidden="true">*</span></label>
                    <input type="date" id="startServiceDate" th:field="*{startServiceDate}"
                           th:class="${#fields.hasErrors('startServiceDate')} ? 'input-error' : ''"
                           required />
                    <span class="error-text" th:if="${#fields.hasErrors('startServiceDate')}"
                          th:errors="*{startServiceDate}"></span>
                </div>

                <div class="form-group">
                    <label for="endServiceDate">Data de fi del servei <span aria-hidden="true">*</span></label>
                    <input type="date" id="endServiceDate" th:field="*{endServiceDate}"
                           th:class="${#fields.hasErrors('endServiceDate')} ? 'input-error' : ''"
                           required />
                    <span class="error-text" th:if="${#fields.hasErrors('endServiceDate')}"
                          th:errors="*{endServiceDate}"></span>
                </div>
            </th:block>

            <div class="form-actions">
                <a th:href="@{/oviUser/solicitudes/{id}(id=${solicitud.requestID})}"
                   class="btn btn-secondary">Cancel·lar</a>
                <button type="submit" class="btn btn-primary">Guardar canvis</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
