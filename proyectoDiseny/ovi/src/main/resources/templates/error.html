<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Error</title>
</head>
<body>

<div layout:fragment="content">
    <main class="form-section">

        <h1>S'ha produït un error</h1>

        <!-- Error lanzado por SgOVIException -->
        <div th:if="${errorName}">
            <p><strong th:text="${errorName}"></strong></p>
            <p th:text="${message}"></p>
        </div>

        <!-- Error lanzado por Spring (ruta no encontrada, etc.) -->
        <div th:if="${errorName == null}">
            <p><strong th:text="${status}"></strong></p>
            <p th:text="${error}"></p>
        </div>

        <a th:href="@{/}" class="btn">Tornar a l'inici</a>

    </main>
</div>

</body>
</html>
