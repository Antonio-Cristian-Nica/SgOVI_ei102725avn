<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Error</title>
</head>
<body>

<div layout:fragment="content">
    <div class="login-wrapper">
        <div class="form-section">

            <h2 class="section-title">S'ha produït un error</h2>

            <div th:if="${errorName}" class="alert alert-error">
                <strong th:text="${errorName}"></strong>
                <p th:text="${message}"></p>
            </div>

            <div th:if="${errorName == null}" class="alert alert-error">
                <strong th:text="${status}"></strong>
                <p th:text="${error}"></p>
                <p th:text="${message}"></p>
            </div>

            <div class="form-actions">
                <a th:href="@{/}" class="btn btn-secondary">Tornar a l'inici</a>
                <a href="javascript:history.back()" class="btn btn-primary">Tornar enrere</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
