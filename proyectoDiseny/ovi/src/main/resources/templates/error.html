<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Error</title>
</head>
<body>

<div layout:fragment="content">
    <div class="login-wrapper">
        <div class="form-section">

            <h1 class="section-title">S'ha produït un error</h1>

            <div th:if="${errorName != null}" class="alert alert-error">
                <strong th:text="${errorName}"></strong>
                <p th:text="${message}"></p>
            </div>

            <div th:unless="${errorName != null}" class="alert alert-error">
                <strong th:text="${status}"></strong>
                <p th:text="${error}"></p>
                <p th:text="${message}"></p>
            </div>

            <div class="form-actions">
                <a th:href="@{/}" class="btn btn-secondary">Tornar a l'inici</a>
                <a th:href="@{${backUrl}}" class="btn btn-secondary">Tornar enrere</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
