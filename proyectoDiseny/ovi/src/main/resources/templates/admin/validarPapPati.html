<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Validar PAP/PATI</title>
</head>
<body>

<div layout:fragment="content">

    <h1>Candidats PAP/PATI pendents de validació</h1>

    <div th:if="${pappatis.isEmpty()}">
        <p>No hi ha candidats pendents de validació en aquest moment.</p>
    </div>

    <div th:if="${!pappatis.isEmpty()}">
        <table class="data-table">
            <thead>
            <tr>
                <th>Nom i Cognoms</th>
                <th>Correu</th>
                <th>Telèfon</th>
                <th>Data Naixement</th>
                <th>Especialització</th>
                <th>Usuari</th>
                <th>Acció</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pappati : ${pappatis}">
                <td th:text="${pappati.nameAndSurname}"></td>
                <td th:text="${pappati.emailAddress}"></td>
                <td th:text="${pappati.phoneNumber}"></td>
                <td th:text="${pappati.birthDate}"></td>
                <td th:text="${pappati.specializationAreas}"></td>
                <td th:text="${pappati.username}"></td>
                <td>
                    <form th:action="@{/admin/validarPapPati/{username}(username=${pappati.username})}" method="post">
                        <button type="submit" class="btn">Activar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions">
        <a th:href="@{/admin/portal}" style="color: var(--color-secundario); text-decoration: none; font-weight: bold;">Tornar al portal</a>
    </div>

</div>

</body>
</html>
