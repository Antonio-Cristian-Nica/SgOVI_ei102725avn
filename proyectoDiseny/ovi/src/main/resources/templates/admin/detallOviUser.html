<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Detall Usuari OVI</title>
</head>
<body>

<div layout:fragment="content">
    <div class="form-section">

        <h1 class="section-title" th:text="${oviuser.nameAndSurname}"></h1>
        <p class="section-subtitle">
            Usuari: <strong th:text="${oviuser.username}"></strong>
            ·
            Estat:
            <span th:if="${oviuser.status == 'active'}" class="estat-actiu">Actiu</span>
            <span th:if="${oviuser.status == 'inactive'}" class="estat-inactiu">Rebutjat</span>
        </p>

        <div class="filosofia-grid">

            <div>
                <h2 class="form-section-title">Dades personals</h2>

                <dl class="tutor-info">
                    <dt>Correu</dt>
                    <dd th:text="${oviuser.emailAddress}"></dd>

                    <dt>Telèfon</dt>
                    <dd th:text="${oviuser.phoneNumber}"></dd>

                    <dt>Data de naixement</dt>
                    <dd th:text="${#temporals.format(oviuser.birthDate, 'dd/MM/yyyy')}"></dd>

                    <dt>Adreça</dt>
                    <dd th:text="${oviuser.homeAddress}"></dd>

                    <dt>Diversitat funcional</dt>
                    <dd th:text="${oviuser.functionalDiversity != null ? oviuser.functionalDiversity : '—'}"></dd>
                </dl>
            </div>

            <div>
                <!-- MOTIU DE REBUIG -->
                <div th:if="${credentials.rejected}">
                    <h2 class="form-section-title">Motiu del rebuig</h2>
                    <div class="alert alert-error" th:text="${credentials.rejectionReason}"></div>
                </div>

                <!-- CONTRACTES DE L'USUARI -->
                <div th:unless="${credentials.rejected}">
                    <h2 class="form-section-title">Contractes</h2>
                    <p>Consulta l'historial de contractes signats per aquest usuari.</p>
                    <a th:href="@{/admin/contractes/oviUser/{oviID}(oviID=${oviuser.oviID},from=${from})}"
                       class="btn btn-primary">
                        Veure contractes
                    </a>
                </div>
            </div>

        </div>

        <hr class="section-divider">

        <!-- ACCIONS DEL TÈCNIC -->
        <h2 class="form-section-title">Accions</h2>

        <div class="table-actions">

            <!-- Si està actiu, opció de desactivar -->
            <a th:if="${oviuser.status == 'active'}"
               th:href="@{/admin/gestionarOviUsers/{username}/desactivar/confirm(username=${oviuser.username})}"
               class="btn btn-rebutjar">Desactivar usuari</a>

            <!-- Si està rebutjat, opció de reactivar -->
            <a th:if="${oviuser.status == 'inactive'}"
               th:href="@{/admin/gestionarOviUsers/{username}/activar/confirm(username=${oviuser.username})}"
               class="btn btn-primary">Reactivar usuari</a>

        </div>

        <div class="form-actions">
            <a th:href="@{/admin/gestionarOviUsers}" class="btn btn-secondary">Tornar al llistat</a>
        </div>

    </div>
</div>

</body>
</html>
