<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Modificar contracte</title>
</head>
<body>

<div layout:fragment="content">
    <div class="form-section">

        <h1 class="section-title" th:text="'Modificar contracte #' + ${contract.contractID}"></h1>
        <p class="section-subtitle">
            Modifica les dades del contracte. Els camps marcats amb
            <span aria-hidden="true">*</span><span class="sr-only">asterisc</span>
            són obligatoris.
        </p>

        <div class="filosofia-grid">
            <div>
                <h2 class="form-section-title">Usuari OVI</h2>
                <dl class="tutor-info">
                    <dt>Nom</dt>
                    <dd th:text="${oviUser.nameAndSurname}"></dd>

                    <dt>Correu</dt>
                    <dd th:text="${oviUser.emailAddress}"></dd>
                </dl>
            </div>
            <div>
                <h2 class="form-section-title">PAP/PATI</h2>
                <dl class="tutor-info">
                    <dt>Nom</dt>
                    <dd th:text="${papPati.nameAndSurname}"></dd>

                    <dt>Especialització</dt>
                    <dd th:text="${papPati.specializationAreas}"></dd>
                </dl>
            </div>
        </div>

        <h2 class="form-section-title">Dades del contracte</h2>

        <form th:action="@{/admin/contractes/{id}/edit(id=${contract.contractID})}"
              th:object="${contract}" method="post" novalidate
              onsubmit="return confirm('Confirmes la modificació d\'aquest contracte?');">

            <div class="form-row">
                <div class="form-group">
                    <label for="startServiceDate">Data d'inici del servei <span aria-hidden="true">*</span></label>
                    <input type="date" id="startServiceDate" th:field="*{startServiceDate}"
                           th:class="${#fields.hasErrors('startServiceDate')} ? 'input-error' : ''"
                           required />
                    <span class="error-text" th:if="${#fields.hasErrors('startServiceDate')}"
                          th:errors="*{startServiceDate}"></span>
                </div>

                <div class="form-group">
                    <label for="endServiceDate">Data de fi del servei <span aria-hidden="true">*</span></label>
                    <input type="date" id="endServiceDate" th:field="*{endServiceDate}"
                           th:class="${#fields.hasErrors('endServiceDate')} ? 'input-error' : ''"
                           required />
                    <span class="error-text" th:if="${#fields.hasErrors('endServiceDate')}"
                          th:errors="*{endServiceDate}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="documentURL">URL del document PDF <span aria-hidden="true">*</span></label>
                <input type="url" id="documentURL" th:field="*{documentURL}"
                       th:class="${#fields.hasErrors('documentURL')} ? 'input-error' : ''"
                       placeholder="https://..."
                       required />
                <span class="error-text" th:if="${#fields.hasErrors('documentURL')}"
                      th:errors="*{documentURL}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/contractes/{id}(id=${contract.contractID})}"
                   class="btn btn-secondary">Cancel·lar</a>
                <button type="submit" class="btn btn-primary">Guardar canvis</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
