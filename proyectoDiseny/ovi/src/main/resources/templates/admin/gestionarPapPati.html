<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Gestionar PAP/PATI</title>
</head>
<body>

<div layout:fragment="content">

    <h2 class="section-title">Gestió de PAP/PATI</h2>
    <p class="section-subtitle">Llistat de candidats acceptats i rebutjats.</p>

    <div th:if="${pappatis.isEmpty()}" class="alert alert-info">
        No hi ha candidats acceptats o rebutjats en aquest moment.
    </div>

    <div th:if="${!pappatis.isEmpty()}">
        <table class="data-table">
            <thead>
            <tr>
                <th>Nom i Cognoms</th>
                <th>Correu</th>
                <th>Telèfon</th>
                <th>Especialització</th>
                <th>Usuari</th>
                <th>Estat</th>
                <th>Detall</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pappati : ${pappatis}">
                <td th:text="${pappati.nameAndSurname}"></td>
                <td th:text="${pappati.emailAddress}"></td>
                <td th:text="${pappati.phoneNumber}"></td>
                <td th:text="${pappati.specializationAreas}"></td>
                <td th:text="${pappati.username}"></td>
                <td>
                    <span th:if="${pappati.status == 'active'}" class="estat-actiu">Actiu</span>
                    <span th:if="${pappati.status == 'inactive'}" class="estat-inactiu">Rebutjat</span>
                </td>
                <td>
                    <a th:href="@{/admin/gestionarPapPati/{username}(username=${pappati.username})}"
                       class="btn btn-secondary">Veure</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions">
        <a th:href="@{/admin/portal}" class="btn btn-secondary">Tornar al portal</a>
    </div>

</div>

</body>
</html>
