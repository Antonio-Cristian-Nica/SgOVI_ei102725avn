<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Validar Usuaris OVI</title>
</head>
<body>

<div layout:fragment="content">

    <h2 class="section-title">Usuaris OVI pendents de validació</h2>

    <div th:if="${oviusers.isEmpty()}" class="alert alert-info">
        No hi ha usuaris pendents de validació en aquest moment.
    </div>

    <div th:if="${!oviusers.isEmpty()}">
        <table class="data-table">
            <thead>
            <tr>
                <th>Nom i Cognoms</th>
                <th>Correu</th>
                <th>Telèfon</th>
                <th>Data Naixement</th>
                <th>Diversitat Funcional</th>
                <th>Usuari</th>
                <th>Accions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="oviuser : ${oviusers}">
                <td th:text="${oviuser.nameAndSurname}"></td>
                <td th:text="${oviuser.emailAddress}"></td>
                <td th:text="${oviuser.phoneNumber}"></td>
                <td th:text="${oviuser.birthDate}"></td>
                <td th:text="${oviuser.functionalDiversity}"></td>
                <td th:text="${oviuser.username}"></td>
                <td class="table-actions">
                    <form th:action="@{/admin/validarOviUsers/{username}/activar(username=${oviuser.username})}"
                          method="post">
                        <button type="submit" class="btn btn-primary">Activar</button>
                    </form>
                    <form th:action="@{/admin/validarOviUsers/{username}/rebutjar(username=${oviuser.username})}"
                          method="post" class="rebutjar-form">
                            <textarea name="rejectionReason"
                                      class="rebutjar-textarea"
                                      placeholder="Motiu del rebuig..."
                                      required></textarea>
                        <button type="submit" class="btn btn-rebutjar">Rebutjar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions">
        <a th:href="@{/admin/portal}" class="btn btn-secondary">Tornar al portal</a>
    </div>

</div>

</body>
</html>
