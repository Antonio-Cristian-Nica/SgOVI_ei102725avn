<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Iniciar Sessió</title>
</head>
<body>

<div layout:fragment="content">
    <div class="login-wrapper">
        <div class="form-section">
            <h1 class="section-title">Iniciar Sessió</h1>
            <p class="section-subtitle">Introdueix les teues credencials per a accedir.</p>

            <div th:if="${loginError}" class="alert alert-error" role="alert">
                <span th:text="${loginError}"></span>
            </div>

            <form th:action="@{/login}" th:object="${user}" method="post" novalidate>

                <div class="form-group">
                    <label for="username">Nom d'usuari <span aria-hidden="true">*</span></label>
                    <input type="text" id="username" th:field="*{username}"
                           th:class="${#fields.hasErrors('username')} ? 'input-error' : ''"
                           placeholder="El teu nom d'usuari"
                           autocomplete="username" required />
                    <span class="error-text"
                          th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contrasenya <span aria-hidden="true">*</span></label>
                    <input type="password" id="password" th:field="*{password}"
                           th:class="${#fields.hasErrors('password')} ? 'input-error' : ''"
                           placeholder="La teua contrasenya"
                           autocomplete="current-password" required />
                    <span class="error-text"
                          th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/}" class="btn btn-secondary">Cancel·lar</a>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>

            </form>

            <p class="login-register-text">
                No tens compte?
                <a th:href="@{/registro}">Registra't ací</a>
            </p>

        </div>
    </div>
</div>

</body>
</html>
