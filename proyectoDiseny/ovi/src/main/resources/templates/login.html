<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Iniciar Sessió</title>
</head>
<body>

<div layout:fragment="content">
    <main class="form-section" style="max-width: 450px; margin: 0 auto;">

        <h1 style="color: var(--color-primario); margin-bottom: 10px;">Iniciar Sessió</h1>
        <p style="margin-bottom: 30px; color: #666;">Introdueix les teues credencials per a accedir.</p>

        <div th:if="${loginError}" class="error-text"
             style="background-color: rgba(255,140,0,0.08); border: 1px solid var(--color-contraste);
                    border-radius: 4px; padding: 12px 20px; margin-bottom: 20px;">
            <span th:text="${loginError}"></span>
        </div>

        <form th:action="@{/login}" th:object="${user}" method="post">

            <div class="form-group">
                <label for="username">Nom d'usuari</label>
                <input type="text" id="username" th:field="*{username}"
                       placeholder="El teu nom d'usuari" />
                <div th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}" class="error-text"></div>
            </div>

            <div class="form-group">
                <label for="password">Contrasenya</label>
                <input type="password" id="password" th:field="*{password}"
                       placeholder="La teua contrasenya" />
                <div th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}" class="error-text"></div>
            </div>

            <div th:if="${loginError}" class="error-text">
                <span th:text="${loginError}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/}" style="margin-right: 25px; color: var(--color-secundario);
                   text-decoration: none; font-weight: bold;">Cancel·lar</a>
                <button type="submit" class="btn">Entrar</button>
            </div>

        </form>
    </main>
</div>

</body>
</html>
