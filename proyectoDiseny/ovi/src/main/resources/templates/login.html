<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"
      lang="ca">
<head>
    <title>SgOVI - Iniciar Sessió</title>
</head>
<body>

<div layout:fragment="content">
    <div class="login-wrapper">
        <div class="form-section">

            <h2 class="section-title">Iniciar Sessió</h2>
            <p class="section-subtitle">Introdueix les teues credencials per a accedir.</p>

            <div th:if="${loginError}" class="alert alert-error">
                <span th:text="${loginError}"></span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="form-group">
                    <label for="username">Nom d'usuari</label>
                    <input type="text" id="username" name="username"
                           placeholder="El teu nom d'usuari" />
                </div>

                <div class="form-group">
                    <label for="password">Contrasenya</label>
                    <input type="password" id="password" name="password"
                           placeholder="La teua contrasenya" />
                </div>

                <div class="form-actions">
                    <a th:href="@{/}" class="btn btn-secondary">Cancel·lar</a>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>

            </form>

            <p class="login-register-text">
                No tens compte?
                <a th:href="@{/registro}">Registra't ací</a>
            </p>

        </div>
    </div>
</div>

</body>
</html>
